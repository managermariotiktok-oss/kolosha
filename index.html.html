<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Колоша</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --pink:#FF4DA6; --purple:#7B2FBE; --dark:#12071F;
    --gold:#FFD700; --green:#00E676;
  }
  body { background:var(--dark); font-family:'Segoe UI',sans-serif; color:#fff;
    height:100vh; overflow:hidden; display:flex; flex-direction:column; user-select:none; }

  #header { display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; background:linear-gradient(135deg,#2A0D4E,#1A0B2E);
    border-bottom:2px solid var(--purple); flex-shrink:0; }
  .game-title { font-size:22px; font-weight:900; letter-spacing:2px;
    background:linear-gradient(90deg,var(--pink),#FF9EDA);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .stars-badge { display:flex; align-items:center; gap:6px; background:#2A1050;
    border:1.5px solid var(--gold); border-radius:20px; padding:5px 14px;
    font-size:16px; font-weight:700; color:var(--gold); }

  #tabs { display:flex; flex-shrink:0; background:#0E0520; }
  .tab { flex:1; padding:10px 0; text-align:center; font-size:13px; font-weight:700;
    letter-spacing:0.5px; cursor:pointer; transition:all .25s;
    border-bottom:3px solid transparent; color:#888; }
  .tab.active { color:#fff; border-color:var(--pink);
    background:linear-gradient(0deg,rgba(255,77,166,.12),transparent); }

  #stage-wrap { flex:1; position:relative; overflow:hidden;
    background:radial-gradient(ellipse at 50% 100%,#2A0D4E 0%,var(--dark) 65%); }

  .spotlight { position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:200px; height:100%;
    background:radial-gradient(ellipse at 50% 0%,rgba(255,180,255,.09) 0%,transparent 65%);
    pointer-events:none; transition:background .4s; }
  .spotlight.gold-light {
    background:radial-gradient(ellipse at 50% 0%,rgba(255,220,80,.1) 0%,transparent 65%); }

  .stage-floor { position:absolute; bottom:128px; left:0; right:0; height:3px;
    background:linear-gradient(90deg,transparent,var(--purple),var(--pink),var(--purple),transparent);
    box-shadow:0 0 18px 2px rgba(123,47,190,.5); transition:background .4s,box-shadow .4s; }
  .stage-floor.gold-floor {
    background:linear-gradient(90deg,transparent,#8B6914,var(--gold),#8B6914,transparent);
    box-shadow:0 0 18px 2px rgba(255,215,0,.45); }

  #kolosha { position:absolute; bottom:130px; left:50%; transform:translateX(-50%);
    width:110px; text-align:center; display:flex; flex-direction:column; align-items:center; }

  .char-photo-wrap { width:100px; height:120px; position:relative;
    border-radius:50% 50% 45% 45%; overflow:hidden;
    border:3px solid var(--pink);
    box-shadow:0 0 24px rgba(255,77,166,.55),0 0 8px rgba(255,77,166,.3);
    transition:box-shadow .25s,transform .2s,border-color .3s;
    cursor:pointer; }
  .char-photo-wrap img { width:100%; height:100%; object-fit:cover;
    object-position:center top; transition:filter .3s; display:block; }

  .char-photo-wrap.scene-angry img { filter:saturate(.65) contrast(1.15) brightness(.88); }
  .char-photo-wrap.scene-happy {
    border-color:var(--gold);
    box-shadow:0 0 28px rgba(255,215,0,.65),0 0 10px rgba(255,215,0,.3); }
  .char-photo-wrap.scene-happy img { filter:saturate(1.25) brightness(1.1) contrast(1.05); }

  #kolosha.hit .char-photo-wrap {
    transform:scale(1.12) rotate(-7deg);
    box-shadow:0 0 36px rgba(255,50,50,.9); }
  #kolosha.hit .char-photo-wrap img {
    filter:saturate(.35) sepia(.5) hue-rotate(-20deg) brightness(.8) !important; }
  #kolosha.happy .char-photo-wrap {
    transform:scale(1.13);
    box-shadow:0 0 44px rgba(255,215,0,.95); }

  /* singing pulse animation */
  #kolosha.singing .char-photo-wrap {
    animation:sing-pulse 0.5s ease-in-out infinite alternate; }
  @keyframes sing-pulse {
    from { transform:scale(1); }
    to   { transform:scale(1.06); }
  }

  .char-name { font-size:11px; font-weight:700; letter-spacing:2px;
    color:var(--pink); margin-top:6px; text-transform:uppercase; transition:color .3s; }
  .char-name.gold { color:var(--gold); }

  /* audio bar visualizer (fake) */
  #audio-bars { position:absolute; bottom:135px; left:50%; transform:translateX(-50%);
    display:none; align-items:flex-end; gap:3px; height:30px; }
  #audio-bars.show { display:flex; }
  .bar { width:4px; background:var(--gold); border-radius:2px; opacity:.8;
    animation:bar-dance 0.4s ease-in-out infinite alternate; }
  .bar:nth-child(1) { animation-delay:0s;    height:8px; }
  .bar:nth-child(2) { animation-delay:.07s;  height:16px; }
  .bar:nth-child(3) { animation-delay:.14s;  height:24px; }
  .bar:nth-child(4) { animation-delay:.07s;  height:18px; }
  .bar:nth-child(5) { animation-delay:0s;    height:10px; }
  @keyframes bar-dance {
    from { transform:scaleY(0.3); opacity:.5; }
    to   { transform:scaleY(1);   opacity:1;  }
  }

  /* music control */
  #music-ctrl { position:absolute; top:14px; right:14px;
    background:rgba(255,215,0,.12); border:1.5px solid var(--gold);
    border-radius:20px; padding:5px 12px; font-size:12px; font-weight:700;
    color:var(--gold); cursor:pointer; display:none; z-index:10;
    transition:background .2s; }
  #music-ctrl:active { background:rgba(255,215,0,.25); }
  #music-ctrl.show { display:block; }

  #speech { position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(15,5,35,.88); border:1.5px solid rgba(255,255,255,.2);
    border-radius:18px; padding:9px 18px; font-size:13px; color:#FFE;
    text-align:center; max-width:230px; backdrop-filter:blur(8px);
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:9;
    white-space:nowrap; }
  #speech.show { opacity:1; }

  #donate-counter { position:absolute; bottom:138px; right:14px;
    background:rgba(0,230,118,.1); border:1.5px solid var(--green);
    border-radius:12px; padding:5px 11px; font-size:12px; font-weight:700;
    color:var(--green); display:none; }

  .thrown { position:absolute; font-size:32px; pointer-events:none; z-index:20;
    animation:throw-arc .5s cubic-bezier(.25,.46,.45,.94) forwards; }
  @keyframes throw-arc {
    0%   { transform:translateY(60px) scale(.7); opacity:1; }
    55%  { transform:translateY(-25px) scale(1.15); opacity:1; }
    100% { transform:translateY(20px) scale(.2); opacity:0; }
  }
  .splat { position:absolute; font-size:26px; pointer-events:none; z-index:19;
    animation:splat .75s ease-out forwards; }
  @keyframes splat {
    0%  { transform:scale(0) rotate(0deg); opacity:1; }
    40% { transform:scale(1.6) rotate(25deg); opacity:1; }
    100%{ transform:scale(.4) rotate(55deg); opacity:0; }
  }
  .screen-flash { position:absolute; inset:0; pointer-events:none; z-index:50;
    background:rgba(255,50,50,.28); animation:flash .3s ease-out forwards; }
  @keyframes flash { to { opacity:0; } }

  .donat-float { position:absolute; pointer-events:none; z-index:20;
    font-size:24px; animation:float-up 1.1s ease-out forwards; }
  @keyframes float-up {
    0%  { transform:translateY(0) scale(1); opacity:1; }
    100%{ transform:translateY(-140px) scale(.3); opacity:0; }
  }
  .confetti { position:absolute; width:9px; height:9px; border-radius:2px;
    pointer-events:none; z-index:30; animation:confetti-fall 1.6s ease-in forwards; }
  @keyframes confetti-fall {
    0%  { transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(220px) rotate(720deg); opacity:0; }
  }
  .note { position:absolute; font-size:20px; pointer-events:none; z-index:15;
    animation:note-rise 2s ease-out forwards; }
  @keyframes note-rise {
    0%  { transform:translateY(0) rotate(-12deg); opacity:.8; }
    100%{ transform:translateY(-130px) rotate(28deg); opacity:0; }
  }

  #bottom-panel { flex-shrink:0; background:linear-gradient(180deg,#12071F,#0A0318);
    border-top:2px solid #2A0D4E; padding:10px 12px 14px;
    max-height:168px; overflow-y:auto; }
  .shop-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .shop-item { background:#1E0B38; border:1.5px solid #3A1560; border-radius:14px;
    padding:10px 6px 8px; text-align:center; cursor:pointer;
    transition:transform .15s,opacity .2s;
    display:flex; flex-direction:column; align-items:center; gap:3px; opacity:.45; }
  .shop-item.affordable { opacity:1; border-color:var(--purple); background:#2A0D4E; }
  .shop-item.affordable:active { transform:scale(.91); border-color:var(--pink); }
  .shop-item .item-icon { font-size:26px; }
  .shop-item .item-price { font-size:11px; color:var(--gold); font-weight:700; }
  .shop-item .item-name { font-size:10px; color:#aaa; }

  .donate-info-text { text-align:center; color:#bbb; font-size:13px; margin-bottom:10px; }
  .donate-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .donate-item { background:#1A0B2E; border:1.5px solid #2E1050; border-radius:14px;
    padding:10px 6px 8px; text-align:center; cursor:pointer;
    transition:transform .15s,opacity .2s;
    display:flex; flex-direction:column; align-items:center; gap:3px; opacity:.45; }
  .donate-item.affordable { opacity:1; border-color:var(--green); background:#0D2B1A; }
  .donate-item.affordable:active { transform:scale(.91); }
  .donate-item .item-icon { font-size:24px; }
  .donate-item .item-price { font-size:11px; color:var(--gold); font-weight:700; }
  .donate-item .item-name { font-size:10px; color:#aaa; }

  #bottom-panel::-webkit-scrollbar { width:4px; }
  #bottom-panel::-webkit-scrollbar-track { background:transparent; }
  #bottom-panel::-webkit-scrollbar-thumb { background:var(--purple); border-radius:4px; }
</style>
</head>

<script>
let stars=50, scene=1, donateTotal=0;
let speechTimer=null, notesRunning=false, noteTimer=null;
let musicPlaying=false;

const audio = document.getElementById('kolosha-audio');

const phrases1=['Ах вы так?! 😤','Хватит!! 😭','Позор! Позор! 🥚','Я вам это запомню! 😠','Слёзы текут... 😢','МОЙ КОСТЮМ!!','Вы монстры! 😱','Охрана!! 😤','Буду петь назло! 🎤'];

// Simple beep sounds for scene 1
const actx=new (window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='sine',v=.14){try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.setValueAtTime(f,actx.currentTime);g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}catch(e){}}
function playSplat(){beep(160,.18,'sawtooth',.2);setTimeout(()=>beep(90,.1,'square',.15),80);}

function toggleMusic(){
  if(musicPlaying){
    audio.pause();
    musicPlaying=false;
    document.getElementById('music-ctrl').textContent='▶ Играть';
    document.getElementById('audio-bars').classList.remove('show');
    document.getElementById('kolosha').classList.remove('singing');
  } else {
    audio.play().then(()=>{
      musicPlaying=true;
      document.getElementById('music-ctrl').textContent='⏸ Пауза';
      document.getElementById('audio-bars').classList.add('show');
      document.getElementById('kolosha').classList.add('singing');
    }).catch(()=>{
      showSpeech('Нажми ещё раз! 🎵');
    });
  }
}

function updateStars(){
  document.getElementById('stars-count').textContent=stars;
  document.querySelectorAll('.shop-item').forEach(el=>{const p=parseInt(el.querySelector('.item-price').textContent.replace('⭐ ',''));el.classList.toggle('affordable',stars>=p);});
  document.querySelectorAll('.donate-item').forEach(el=>{const p=parseInt(el.querySelector('.item-price').textContent.replace('⭐ ',''));el.classList.toggle('affordable',stars>=p);});
}

function showSpeech(text){
  const el=document.getElementById('speech');
  el.textContent=text; el.classList.add('show');
  clearTimeout(speechTimer);
  speechTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

function setScene(n){
  scene=n;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n-1));
  document.getElementById('panel-1').style.display=n===1?'grid':'none';
  document.getElementById('panel-2').style.display=n===2?'block':'none';
  document.getElementById('donate-counter').style.display=n===2?'block':'none';
  document.getElementById('music-ctrl').classList.toggle('show',n===2);
  const wrap=document.getElementById('photo-wrap');
  const name=document.getElementById('char-name');
  const spot=document.getElementById('spotlight');
  const floor=document.getElementById('stage-floor');
  const kol=document.getElementById('kolosha');
  if(n===1){
    wrap.classList.remove('scene-happy'); wrap.classList.add('scene-angry');
    name.classList.remove('gold');
    spot.classList.remove('gold-light'); floor.classList.remove('gold-floor');
    // stop music
    audio.pause(); audio.currentTime=0; musicPlaying=false;
    document.getElementById('music-ctrl').textContent='▶ Играть';
    document.getElementById('audio-bars').classList.remove('show');
    kol.classList.remove('singing');
    stopNotes(); showSpeech('Не трогайте меня! 😤');
  } else {
    wrap.classList.remove('scene-angry'); wrap.classList.add('scene-happy');
    name.classList.add('gold');
    spot.classList.add('gold-light'); floor.classList.add('gold-floor');
    startNotes();
    showSpeech('Нажми ▶ чтобы услышать меня! 🎤');
  }
}

function throwItem(icon,cost,phrase){
  if(stars<cost){showSpeech('Не хватает звёзд! ⭐');beep(200,.3,'square',.1);return;}
  stars-=cost; updateStars();
  const stage=document.getElementById('stage-wrap');
  const kol=document.getElementById('kolosha');
  const kRect=kol.getBoundingClientRect();
  const sRect=stage.getBoundingClientRect();
  const obj=document.createElement('div');
  obj.className='thrown'; obj.textContent=icon;
  obj.style.left=(kRect.left-sRect.left+20+Math.random()*30-15)+'px';
  obj.style.bottom='155px';
  stage.appendChild(obj);
  setTimeout(()=>{
    const sp=document.createElement('div'); sp.className='splat';
    sp.textContent=['💦','✨','💥','🫧'][Math.floor(Math.random()*4)];
    sp.style.left=(kRect.left-sRect.left+5+Math.random()*40)+'px';
    sp.style.bottom=(195+Math.random()*25)+'px';
    stage.appendChild(sp); setTimeout(()=>sp.remove(),800);
    const fl=document.createElement('div'); fl.className='screen-flash';
    stage.appendChild(fl); setTimeout(()=>fl.remove(),300);
    obj.remove();
  },350);
  kol.classList.add('hit'); setTimeout(()=>kol.classList.remove('hit'),520);
  showSpeech(phrase);
  playSplat();
}

function sendDonate(icon,cost,amount,phrase){
  if(stars<cost){showSpeech('Не хватает звёзд! ⭐');beep(200,.3,'square',.1);return;}
  stars-=cost; donateTotal+=amount; updateStars();
  document.getElementById('donate-total').textContent=donateTotal.toLocaleString('ru');
  // restart audio from beginning on each donate for impact
  if(musicPlaying){
    audio.currentTime=0;
  }
  const stage=document.getElementById('stage-wrap');
  const kol=document.getElementById('kolosha');
  const kRect=kol.getBoundingClientRect();
  const sRect=stage.getBoundingClientRect();
  for(let i=0;i<4;i++){
    const d=document.createElement('div'); d.className='donat-float'; d.textContent=icon;
    d.style.left=(kRect.left-sRect.left+10+Math.random()*60-30)+'px';
    d.style.bottom='180px'; d.style.animationDelay=(i*.15)+'s';
    stage.appendChild(d); setTimeout(()=>d.remove(),1500);
  }
  const colors=['#FF4DA6','#FFD700','#7B2FBE','#00E676','#FF3B3B','#00BFFF'];
  for(let i=0;i<18;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=(15+Math.random()*(sRect.width-30))+'px';
    c.style.top=(8+Math.random()*90)+'px';
    c.style.animationDelay=(Math.random()*.4)+'s';
    stage.appendChild(c); setTimeout(()=>c.remove(),2100);
  }
  kol.classList.add('happy'); setTimeout(()=>kol.classList.remove('happy'),650);
  showSpeech(phrase);
}

function charTap(){
  if(scene===1){showSpeech(phrases1[Math.floor(Math.random()*phrases1.length)]);beep(440,.1,'sine',.07);}
  else{
    showSpeech(phrases2[Math.floor(Math.random()*phrases2.length)]);
    if(!musicPlaying) showSpeech('Нажми ▶ чтобы услышать меня! 🎤');
  }
}

function startNotes(){notesRunning=true;spawnNote();}
function stopNotes(){notesRunning=false;clearTimeout(noteTimer);}
function spawnNote(){
  if(!notesRunning)return;
  const stage=document.getElementById('stage-wrap');
  const note=document.createElement('div'); note.className='note';
  note.textContent=['🎵','🎶','♪','♫'][Math.floor(Math.random()*4)];
  note.style.left=(25+Math.random()*170)+'px';
  note.style.bottom=(175+Math.random()*40)+'px';
  stage.appendChild(note); setTimeout(()=>note.remove(),2000);
  noteTimer=setTimeout(spawnNote,500+Math.random()*700);
}

updateStars();
showSpeech('Не трогайте меня! 😤');
</script>
</body>
</html>
